<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>經絡穴位查詢系統</title>
<style>
  /* ===== RESET & BASE ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 15px; }
  body {
    font-family: -apple-system, 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
    background: #f5f0eb;
    color: #2c2418;
    height: 100vh;
    overflow: hidden;
  }
  a { color: inherit; text-decoration: none; }

  /* ===== LAYOUT ===== */
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 1400px;
    margin: 0 auto;
    background: #faf8f5;
    box-shadow: 0 0 40px rgba(0,0,0,0.06);
  }
  .layout-body {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ===== TOP NAV ===== */
  #topnav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 54px;
    min-height: 54px;
    background: linear-gradient(135deg, #2c2418 0%, #3d3228 100%);
    color: #f5f0eb;
    border-bottom: 2px solid #c9a86c;
  }
  #topnav .nav-brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #topnav .nav-brand .nav-icon {
    font-size: 1.3rem;
    line-height: 1;
  }
  #topnav .nav-brand .nav-title {
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 2px;
  }
  #topnav .nav-brand .nav-title span {
    color: #c9a86c;
    font-weight: 400;
  }
  #topnav .nav-right {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .nav-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.15);
    color: #e8e0d8;
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .nav-btn:hover {
    background: rgba(255,255,255,0.1);
    color: #fff;
    border-color: rgba(255,255,255,0.3);
  }
  .nav-btn.home-btn {
    background: #c9a86c;
    color: #2c2418;
    border-color: #c9a86c;
    font-weight: 600;
  }
  .nav-btn.home-btn:hover {
    background: #d4b87a;
    border-color: #d4b87a;
  }
  .dd-arrow {
    font-size: 0.6rem;
    margin-left: 2px;
    transition: transform 0.2s;
  }
  .dd-arrow.open { transform: rotate(180deg); }
  #menuBtn {
    display: none;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.15);
    color: #e8e0d8;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 1.1rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  #menuBtn:hover {
    background: rgba(255,255,255,0.1);
    color: #fff;
  }

  /* DROPDOWN */
  .dropdown-wrap { position: relative; }
  .dropdown-menu {
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    min-width: 200px;
    background: #fff;
    border: 1px solid #e8e0d8;
    border-radius: 10px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    opacity: 0;
    visibility: hidden;
    transform: translateY(-6px);
    transition: all 0.2s ease;
    z-index: 1000;
    overflow: hidden;
  }
  .dropdown-menu.open {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
  }
  .dropdown-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 18px;
    font-size: 0.88rem;
    color: #3d3228;
    cursor: pointer;
    transition: background 0.12s;
    white-space: nowrap;
  }
  .dropdown-item:hover {
    background: #f5f0eb;
  }
  .dropdown-item:active {
    background: #e8e0d8;
  }
  .dropdown-item .item-icon { font-size: 1rem; }
  .dropdown-divider {
    height: 1px;
    background: #e8e0d8;
    margin: 4px 0;
  }

  /* ===== MOBILE HEADER (legacy, hidden on desktop) ===== */
  #header { display: none; }

  /* ===== SIDEBAR ===== */
  #sidebar {
    width: 340px;
    min-width: 340px;
    background: #f8f4ef;
    border-right: 1px solid #e8e0d8;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #sidebar .sidebar-header {
    padding: 24px 20px 16px;
    border-bottom: 1px solid #e8e0d8;
    background: #faf6f1;
  }
  #sidebar .sidebar-header h1 {
    font-size: 1.25rem;
    font-weight: 700;
    color: #2c2418;
    letter-spacing: 2px;
  }
  #sidebar .sidebar-header h1 small {
    font-size: 0.7rem;
    font-weight: 400;
    color: #8a7a6a;
    display: block;
    margin-top: 2px;
    letter-spacing: 0.5px;
  }
  #sidebar .sidebar-header .total-count {
    font-size: 0.75rem;
    color: #8a7a6a;
    margin-top: 6px;
  }

  /* SEARCH */
  #searchWrap {
    padding: 12px 16px;
    border-bottom: 1px solid #e8e0d8;
  }
  #searchInput {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid #ddd6ce;
    border-radius: 8px;
    font-size: 0.9rem;
    background: #fff;
    color: #2c2418;
    outline: none;
    transition: border-color 0.2s;
  }
  #searchInput:focus {
    border-color: #8a7a6a;
    box-shadow: 0 0 0 3px rgba(138,122,106,0.12);
  }
  #searchInput::placeholder { color: #b0a69a; }

  /* MERIDIAN LIST */
  #meridianList {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }
  #meridianList::-webkit-scrollbar { width: 5px; }
  #meridianList::-webkit-scrollbar-thumb { background: #ddd6ce; border-radius: 4px; }
  #meridianList::-webkit-scrollbar-track { background: transparent; }

  .meridian-group { margin-bottom: 4px; }
  .meridian-group-label {
    padding: 6px 20px;
    font-size: 0.7rem;
    font-weight: 700;
    color: #a09080;
    text-transform: uppercase;
    letter-spacing: 2px;
    padding-top: 14px;
  }

  .meridian-item { }
  .meridian-header {
    display: flex;
    align-items: center;
    padding: 8px 20px 8px 16px;
    cursor: pointer;
    transition: background 0.15s;
    user-select: none;
    gap: 6px;
  }
  .meridian-header:hover { background: #efe9e2; }
  .meridian-header .arrow {
    width: 18px;
    font-size: 0.65rem;
    color: #b0a69a;
    transition: transform 0.2s;
    flex-shrink: 0;
    text-align: center;
  }
  .meridian-header.open .arrow { transform: rotate(90deg); }
  .meridian-header .meridian-name {
    font-size: 0.85rem;
    font-weight: 600;
    color: #3d3228;
    flex: 1;
  }
  .meridian-header .meridian-code {
    font-size: 0.7rem;
    color: #a09080;
    font-weight: 400;
    margin-right: 4px;
  }
  .meridian-header .meridian-count {
    font-size: 0.65rem;
    color: #b0a69a;
    background: #f0eae4;
    padding: 1px 8px;
    border-radius: 10px;
  }
  .meridian-header .meridian-path {
    display: none;
  }

  .acupoint-list { display: none; }
  .acupoint-list.open { display: block; }

  .acupoint-item {
    display: flex;
    align-items: center;
    padding: 5px 20px 5px 48px;
    cursor: pointer;
    transition: background 0.12s;
    font-size: 0.85rem;
    gap: 8px;
  }
  .acupoint-item:hover { background: #efe9e2; }
  .acupoint-item.active {
    background: #e3d9d0;
    border-left: 3px solid #8a6d4b;
    padding-left: 45px;
  }
  .acupoint-item .point-code {
    font-size: 0.7rem;
    color: #a09080;
    font-family: 'SF Mono', 'Menlo', monospace;
    min-width: 42px;
  }
  .acupoint-item .point-name {
    font-weight: 500;
    color: #3d3228;
  }

  /* ===== MAIN CONTENT ===== */
  #main {
    flex: 1;
    overflow-y: auto;
    padding: 40px 48px;
    background: #faf8f5;
  }
  #main::-webkit-scrollbar { width: 5px; }
  #main::-webkit-scrollbar-thumb { background: #ddd6ce; border-radius: 4px; }
  #main::-webkit-scrollbar-track { background: transparent; }

  /* EMPTY STATE */
  #emptyState {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    text-align: center;
    color: #b0a69a;
  }
  #emptyState .icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.5; }
  #emptyState h2 { font-size: 1.2rem; font-weight: 600; color: #8a7a6a; margin-bottom: 8px; }
  #emptyState p { font-size: 0.85rem; max-width: 320px; line-height: 1.6; }

  /* DETAIL VIEW */
  #detailView { display: none; }

  .detail-header {
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 2px solid #e8e0d8;
  }
  .detail-header .point-title {
    display: flex;
    align-items: baseline;
    gap: 12px;
    flex-wrap: wrap;
  }
  .detail-header .point-title h2 {
    font-size: 2rem;
    font-weight: 700;
    color: #2c2418;
  }
  .detail-header .point-title .point-code-badge {
    font-size: 1.1rem;
    color: #8a7a6a;
    font-weight: 400;
    font-family: 'SF Mono', 'Menlo', monospace;
    background: #f0eae4;
    padding: 4px 14px;
    border-radius: 6px;
  }
  .detail-header .point-meridian {
    font-size: 0.9rem;
    color: #6a5a4a;
    margin-top: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .detail-header .point-meridian .meridian-tag {
    background: #e3d9d0;
    padding: 3px 12px;
    border-radius: 4px;
    font-size: 0.8rem;
    font-weight: 500;
  }

  .detail-section {
    margin-bottom: 24px;
  }
  .detail-section h3 {
    font-size: 0.8rem;
    font-weight: 700;
    color: #8a7a6a;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .detail-section .section-body {
    font-size: 0.95rem;
    line-height: 1.7;
    color: #3d3228;
  }

  .body-diagram-section h3 {
    margin-bottom: 4px;
  }
  .body-diagram-container {
    background: #fdfcf9;
    border-radius: 10px;
    padding: 2px 6px;
    border: 1px solid #e8ddd0;
    overflow: hidden;
  }
  .body-diagram-container svg {
    display: block;
    margin: 0 auto;
  }

  .detail-location {
    background: #f8f4ef;
    border-radius: 8px;
    padding: 16px 20px;
    border-left: 3px solid #c9a86c;
    font-size: 0.95rem;
    line-height: 1.7;
    color: #3d3228;
  }

  .detail-categories {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 4px;
  }
  .detail-categories .cat-tag {
    background: #c9a86c;
    color: #2c2418;
    font-size: 0.7rem;
    padding: 2px 10px;
    border-radius: 4px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .detail-functions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
  }
  .detail-functions .func-tag {
    background: #f0eae4;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.85rem;
    color: #3d3228;
    border: 1px solid #e0d6ce;
  }

  /* MERIDIAN INFO IN DETAIL */
  .meridian-info-box {
    background: #f8f4ef;
    border-radius: 8px;
    padding: 16px 20px;
    border-left: 3px solid #8a6d4b;
  }
  .meridian-info-box .path-label {
    font-size: 0.75rem;
    font-weight: 600;
    color: #8a7a6a;
    margin-bottom: 6px;
    letter-spacing: 1px;
  }
  .meridian-info-box .path-text {
    font-size: 0.9rem;
    line-height: 1.6;
    color: #3d3228;
  }

  /* ACUPUNCTURE INFO */
  .acu-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .acu-card {
    background: #f8f4ef;
    border-radius: 8px;
    padding: 14px 16px;
    border-left: 3px solid #c9a86c;
  }
  .acu-card.full-width {
    grid-column: 1 / -1;
  }
  .acu-card .acu-label {
    font-size: 0.7rem;
    font-weight: 700;
    color: #8a7a6a;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .acu-card .acu-value {
    font-size: 0.9rem;
    line-height: 1.6;
    color: #3d3228;
  }
  .acu-card .acu-value.warning {
    color: #b85a3a;
    font-weight: 500;
  }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    #topnav { padding: 0 16px; }
    #topnav .nav-brand .nav-title { font-size: 0.9rem; letter-spacing: 1px; }
    .nav-btn { padding: 5px 10px; font-size: 0.75rem; }
    .nav-btn.home-btn .home-label { display: none; }
    #menuBtn { display: block; }
    #header { display: none; }
    #sidebar {
      width: 100%;
      min-width: 0;
      max-height: 50vh;
      border-right: none;
      border-bottom: 1px solid #e8e0d8;
    }
    #sidebar.collapsed { max-height: 0; overflow: hidden; }
    .layout-body { flex-direction: column; }
    #main { padding: 24px 20px; }
    .detail-header .point-title h2 { font-size: 1.5rem; }
    .dropdown-menu {
      min-width: 180px;
      right: 0;
      left: auto;
    }
  }
  @media (max-width: 420px) {
    #topnav .nav-brand .nav-title { font-size: 0.8rem; }
    .nav-btn { padding: 4px 8px; font-size: 0.7rem; }
  }

  /* NO RESULTS */
  .no-results {
    padding: 24px 20px;
    text-align: center;
    color: #b0a69a;
    font-size: 0.85rem;
  }

  /* HIGHLIGHT */
  .highlight { background: #f7e9c0; padding: 0 2px; border-radius: 2px; }

  /* MODAL OVERLAY */
  #modalOverlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 2000;
    justify-content: center;
    align-items: center;
    padding: 24px;
    backdrop-filter: blur(2px);
  }
  #modalOverlay.open { display: flex; }
  .modal-box {
    background: #fff;
    border-radius: 14px;
    max-width: 480px;
    width: 100%;
    max-height: 80vh;
    overflow: hidden;
    box-shadow: 0 16px 48px rgba(0,0,0,0.2);
    animation: modalIn 0.2s ease-out;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.96) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 22px;
    border-bottom: 1px solid #e8e0d8;
    background: #faf8f5;
  }
  .modal-header h3 {
    font-size: 1rem;
    font-weight: 700;
    color: #2c2418;
  }
  #modalClose {
    background: none;
    border: none;
    font-size: 1.5rem;
    color: #8a7a6a;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
  }
  #modalClose:hover { color: #3d3228; }
  .modal-body {
    padding: 20px 22px;
    overflow-y: auto;
    max-height: 60vh;
  }
  .modal-body pre {
    font-family: -apple-system, 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
    font-size: 0.9rem;
    line-height: 1.8;
    color: #3d3228;
    white-space: pre-wrap;
    word-wrap: break-word;
    margin: 0;
  }

  /* ANIMATION */
  .fade-in { animation: fadeIn 0.25s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  /* BACK BUTTON ON MOBILE */
  #backBtn {
    display: none;
    background: none;
    border: 1px solid #ddd6ce;
    color: #3d3228;
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 0.8rem;
    cursor: pointer;
    margin-bottom: 16px;
  }
  #backBtn:hover { background: #f0eae4; }
</style>
</head>
<body>
<div id="app">
  <!-- Top Navigation Bar -->
  <nav id="topnav">
    <div class="nav-brand">
      <span class="nav-icon">☯</span>
      <span class="nav-title">經絡穴位<span>查詢系統</span></span>
    </div>
    <div class="nav-right">
      <button class="nav-btn home-btn" id="homeBtn">🏠 回首頁</button>
      <div class="dropdown-wrap">
        <button class="nav-btn" id="dropdownToggle">
          選單
          <span class="dd-arrow">▾</span>
        </button>
        <div class="dropdown-menu" id="dropdownMenu">
          <div class="dropdown-item" data-action="home">
            <span class="item-icon">🏠</span> 回首頁
          </div>
          <div class="dropdown-item" data-action="meridians">
            <span class="item-icon">📖</span> 經穴總覽
          </div>
          <div class="dropdown-item" data-action="acu-guide">
            <span class="item-icon">🪡</span> 針灸指南
          </div>
          <div class="dropdown-item" data-action="wellness">
            <span class="item-icon">🌿</span> 養生保健
          </div>
          <div class="dropdown-divider"></div>
          <div class="dropdown-item" data-action="tcm-helper">
            <span class="item-icon">🏥</span> 中醫診療助手
          </div>
          <div class="dropdown-item" data-action="about">
            <span class="item-icon">ℹ️</span> 關於本站
          </div>
        </div>
      </div>
      <button id="menuBtn" aria-label="選單">☰</button>
    </div>
  </nav>

  <div class="layout-body">
    <!-- Mobile header (shown on mobile only) -->
    <div id="header">
      <span class="brand">經絡穴位<span>查詢系統</span></span>
    </div>

    <!-- Sidebar -->
    <div id="sidebar">
      <div class="sidebar-header">
        <h1>經絡穴位<small>Traditional Chinese Medicine Acupoint Reference</small></h1>
        <div class="total-count">收錄 14 經脈 · <span id="totalPoints">0</span> 穴</div>
      </div>
      <div id="searchWrap">
        <input type="text" id="searchInput" placeholder="搜尋穴名、代碼、主治功能…" autocomplete="off">
      </div>
      <div id="meridianList"></div>
    </div>

    <!-- Main content -->
    <div id="main">
      <button id="backBtn">← 返回列表</button>
      <div id="emptyState">
        <div class="icon">☯</div>
        <h2>請選擇一個穴位</h2>
        <p>從左側經絡列表中點選穴位，查看詳細位置、功能與主治</p>
      </div>
    <div id="detailView"></div>
  </div>
</div>

<!-- Modal overlay -->
<div id="modalOverlay">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="modalTitle"></h3>
      <button id="modalClose" aria-label="關閉">&times;</button>
    </div>
    <div class="modal-body">
      <pre id="modalContent"></pre>
    </div>
  </div>
</div>
</div>

<script>
// ===================================================================
// DATA
// ===================================================================
const MERIDIANS = [
  { id: 'lu',  group: '手三陰經', name: '手太陰肺經', code: 'LU',  path: '中焦→大腸→胃→肺→喉嚨→腋下→手臂前內側→拇指', count: 11 },
  { id: 'pc',  group: '手三陰經', name: '手厥陰心包經', code: 'PC', path: '胸中→心包→上腹→胸→腋下→手臂前內側（中間）→中指', count: 9 },
  { id: 'ht',  group: '手三陰經', name: '手少陰心經', code: 'HT',  path: '心→小腸→肺→腋下→手臂前內側（後緣）→小指', count: 9 },
  { id: 'li',  group: '手三陽經', name: '手陽明大腸經', code: 'LI',  path: '食指→手臂前外側→肩→頸→鼻旁', count: 20 },
  { id: 'te',  group: '手三陽經', name: '手少陽三焦經', code: 'TE', path: '無名指→手臂後外側→肩→頸→耳後→眉梢', count: 23 },

let selectedPoint = null;
let searchQuery = '';
let openMeridians = new Set();

document.getElementById('totalPoints').textContent = POINTS.length;

// ===================================================================
// RENDER MERIDIAN LIST
// ===================================================================
function renderMeridianList(points, query) {
  const container = document.getElementById('meridianList');
  container.innerHTML = '';

  if (query && query.trim()) {
    // Search mode: flat results
    const q = query.trim().toLowerCase();
    const results = points.filter(p => {
      const searchText = `${p.name} ${p.code} ${p.ind} ${getMeridian(p.mid).name} ${p.loc}`.toLowerCase();
      return searchText.includes(q);
    });

    if (results.length === 0) {
      container.innerHTML = '<div class="no-results">❌ 未找到符合「' + query.trim() + '」的穴位</div>';
      return;
    }

    // Group by meridian
    const grouped = {};
    results.forEach(p => {
      const mid = p.mid;
      if (!grouped[mid]) grouped[mid] = [];
      grouped[mid].push(p);
    });

    const sortedMids = Object.keys(grouped).sort((a, b) => {
      const idxA = MERIDIANS.findIndex(m => m.id === a);
      const idxB = MERIDIANS.findIndex(m => m.id === b);
      return idxA - idxB;
    });

    sortedMids.forEach(mid => {
      const mer = getMeridian(mid);
      const grp = document.createElement('div');
      grp.className = 'meridian-group';
      grp.innerHTML = `<div class="meridian-group-label">${mer.group}</div>`;

      const items = grouped[mid];
      items.forEach(p => {
        const item = document.createElement('div');
        item.className = 'acupoint-item';
        if (selectedPoint && selectedPoint.code === p.code) item.classList.add('active');
        const highlightedName = highlightText(p.name, q);
        item.innerHTML = `<span class="point-code">${p.code}</span><span class="point-name">${highlightedName}</span>`;
        item.addEventListener('click', () => selectPoint(p));
        grp.appendChild(item);
      });
      container.appendChild(grp);
    });
  } else {
    // Meridian tree mode
    const groups = ['手三陰經', '手三陽經', '足三陽經', '足三陰經', '奇經'];

    groups.forEach(groupName => {
      const groupMeridians = MERIDIANS.filter(m => m.group === groupName);
      if (groupMeridians.length === 0) return;

      const grpDiv = document.createElement('div');
      grpDiv.className = 'meridian-group';
      const label = document.createElement('div');
      label.className = 'meridian-group-label';
      label.textContent = groupName;
      grpDiv.appendChild(label);

      groupMeridians.forEach(mer => {
        const meridiansPoints = points.filter(p => p.mid === mer.id);
        if (meridiansPoints.length === 0) return;

        const item = document.createElement('div');
        item.className = 'meridian-item';

        const header = document.createElement('div');
        header.className = 'meridian-header';
        if (openMeridians.has(mer.id)) header.classList.add('open');

        const arrow = document.createElement('span');
        arrow.className = 'arrow';
        arrow.textContent = '▶';
        header.appendChild(arrow);

        const nameSpan = document.createElement('span');
        nameSpan.className = 'meridian-name';
        nameSpan.textContent = mer.name;
        header.appendChild(nameSpan);

        const codeSpan = document.createElement('span');
        codeSpan.className = 'meridian-code';
        codeSpan.textContent = `(${mer.code})`;
        header.appendChild(codeSpan);

        const countSpan = document.createElement('span');
        countSpan.className = 'meridian-count';
        countSpan.textContent = `${meridiansPoints.length}穴`;
        header.appendChild(countSpan);

        header.addEventListener('click', () => {
          if (openMeridians.has(mer.id)) {
            openMeridians.delete(mer.id);
          } else {
            openMeridians.add(mer.id);
          }
          renderMeridianList(points, query);
        });

        item.appendChild(header);

        const list = document.createElement('div');
        list.className = 'acupoint-list';
        if (openMeridians.has(mer.id)) list.classList.add('open');

        meridiansPoints.forEach(p => {
          const pointEl = document.createElement('div');
          pointEl.className = 'acupoint-item';
          if (selectedPoint && selectedPoint.code === p.code) pointEl.classList.add('active');
          pointEl.innerHTML = `<span class="point-code">${p.code}</span><span class="point-name">${p.name}</span>`;
          pointEl.addEventListener('click', (e) => {
            e.stopPropagation();
            selectPoint(p);
          });
          list.appendChild(pointEl);
        });

        item.appendChild(list);
        grpDiv.appendChild(item);
      });

      container.appendChild(grpDiv);
    });
  }
}

// ===================================================================
// SELECT POINT
// ===================================================================
function selectPoint(point) {
  selectedPoint = point;
  const mer = getMeridian(point.mid);

  // Update active state in sidebar
  document.querySelectorAll('.acupoint-item').forEach(el => el.classList.remove('active'));
  // Re-render will handle the active state

  // Show detail view
  const emptyState = document.getElementById('emptyState');
  const detailView = document.getElementById('detailView');
  emptyState.style.display = 'none';
  detailView.style.display = 'block';

  // Build categories HTML
  let catsHtml = '';
  if (point.cat) {
    point.cat.split('、').forEach(c => {
      if (c.trim()) catsHtml += `<span class="cat-tag">${c.trim()}</span>`;
    });
  }

  // Build functions array
  const funcs = point.ind.split('、').filter(f => f.trim());

  // Build meridian info
  const merPath = mer.path || '';
  const merGroup = mer.group || '';

  detailView.innerHTML = `
    <div class="detail-header fade-in">
      <div class="point-title">
        <h2>${point.name}</h2>
        <span class="point-code-badge">${point.code}</span>
      </div>
      <div class="point-meridian">
        <span class="meridian-tag">${mer.name}</span>
        <span style="color:#b0a69a;font-size:0.8rem">${merGroup}</span>
      </div>
      ${catsHtml ? `<div class="detail-categories" style="margin-top:10px">${catsHtml}</div>` : ''}
    </div>

    <div class="detail-section fade-in">
      <h3>📍 穴位位置</h3>
      <div class="detail-location">${point.loc}</div>
    </div>

    <div class="detail-section fade-in">
      <h3>⚕️ 功能與主治</h3>
      <div class="detail-functions">
        ${funcs.map(f => `<span class="func-tag">${f}</span>`).join('')}
      </div>
      <div class="section-body" style="margin-top:10px">
        <p>此穴位於 <strong>${mer.name}</strong>，主要適用於 ${point.ind} 等症狀。</p>
        ${point.cat ? `<p style="margin-top:6px">屬於 <strong>${point.cat}</strong>，為該經脈的重要特定穴。</p>` : ''}
      </div>
    </div>

    ${point.depth ? `
    <div class="detail-section fade-in">
      <h3>🪡 針灸資訊</h3>
      <div class="acu-grid">
        <div class="acu-card">
          <div class="acu-label">針刺深度</div>
          <div class="acu-value">${point.depth}</div>
        </div>
        <div class="acu-card">
          <div class="acu-label">針刺方向</div>
          <div class="acu-value">${point.angle}</div>
        </div>
        <div class="acu-card">
          <div class="acu-label">灸法</div>
          <div class="acu-value">${point.moxa}</div>
        </div>
        ${point.technique ? `<div class="acu-card">
          <div class="acu-label">特殊手法</div>
          <div class="acu-value">${point.technique}</div>
        </div>` : ''}
        ${point.caution ? `<div class="acu-card full-width">
          <div class="acu-label">⚠️ 注意事項</div>
          <div class="acu-value warning">${point.caution}</div>
        </div>` : ''}
      </div>
    </div>` : ''}

    <div class="detail-section fade-in body-diagram-section">
      <h3>🧍 身體穴位對照</h3>
      <div class="body-diagram-container">
        ${renderBodyDiagram(point.mid, (()=>{const pts=POINTS.filter(p=>p.mid===point.mid);return pts.indexOf(point);})())}
      </div>
    </div>

    <div class="detail-section fade-in">
      <h3>🔗 所屬經絡</h3>
      <div class="meridian-info-box">
        <div class="path-label">經絡名稱</div>
        <div class="path-text" style="font-weight:600;margin-bottom:8px">${mer.name}（${mer.code}）</div>
        <div class="path-label">循行走向</div>
        <div class="path-text">${merPath}</div>
      </div>
    </div>
  `;

  // Re-render sidebar to highlight
  renderMeridianList(POINTS, searchQuery);

  // Scroll to the active point
  const activeEl = document.querySelector('.acupoint-item.active');
  if (activeEl) activeEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

  // Mobile: close sidebar
  if (window.innerWidth <= 768) {
    document.getElementById('sidebar').classList.add('collapsed');
  }
}

// ===================================================================
// HELPERS
// ===================================================================
function getMeridian(id) {
  return MERIDIANS.find(m => m.id === id) || { name: '未知', code: '', group: '', path: '' };
}

function highlightText(text, query) {
  if (!query || !query.trim()) return text;
  const q = query.trim();
  const regex = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return text.replace(regex, '<span class="highlight">$1</span>');
}

// ========================================================
// Build polyline path from waypoints
// ========================================================
function waypointsToPath(wp) {
  if (!wp || wp.length < 2) return '';
  return 'M' + wp.map(p => p[0]+','+p[1]).join(' L');
}

// Distribute N points evenly along a polyline defined by waypoints
function distributeOnPolyline(wp, n) {
  if (!wp || wp.length < 2 || n < 1) return [];
  // Calculate cumulative segment lengths
  const segs = [];
  let totalLen = 0;
  for (let i = 0; i < wp.length - 1; i++) {
    const dx = wp[i+1][0] - wp[i][0];
    const dy = wp[i+1][1] - wp[i][1];
    const d = Math.sqrt(dx*dx + dy*dy);
    segs.push({ i, len: d, cumLen: totalLen });
    totalLen += d;
  }
  if (totalLen === 0) return [];
  // Place n points evenly
  const pts = [];
  for (let k = 0; k < n; k++) {
    const targetDist = (k / (n - 1 || 1)) * totalLen;
    // Find which segment
    let segIdx = 0;
    for (let s = 0; s < segs.length; s++) {
      if (targetDist >= segs[s].cumLen && (s === segs.length - 1 || targetDist < segs[s+1].cumLen)) {
        segIdx = s;
        break;
      }
      if (s === segs.length - 1) segIdx = s;
    }
    const seg = segs[segIdx];
    const segStart = seg.cumLen;
    const segLen = seg.len || 1;
    const t = Math.min(Math.max((targetDist - segStart) / segLen, 0), 1);
    const x = wp[seg.i][0] + (wp[seg.i+1][0] - wp[seg.i][0]) * t;
    const y = wp[seg.i][1] + (wp[seg.i+1][1] - wp[seg.i][1]) * t;
    pts.push({ x, y });
  }
  return pts;
}

// ========================================================
// Main render function
// ========================================================
function renderBodyDiagram(merId, selectedIdx) {
  const wp = MERIDIAN_WAYPOINTS[merId];
  if (!wp || wp.length < 2) return '<p style="color:#b0a69a;font-size:0.9rem">暫無對應圖表</p>';

  const mer = MERIDIANS.find(m => m.id === merId);
  if (!mer) return '<p style="color:#b0a69a;font-size:0.9rem">暫無對應圖表</p>';

  const isFront = BODY_VIEW[merId] !== 'back';
  const svg = isFront ? bodySvgFront() : bodySvgBack();

  // Parse as XML to inject meridian graphics
  const parser = new DOMParser();
  const doc = parser.parseFromString(svg, 'text/html');
  const svgEl = doc.querySelector('svg');
  if (!svgEl) return '<p style="color:#b0a69a;font-size:0.9rem">圖表載入錯誤</p>';

  const ns = 'http://www.w3.org/2000/svg';
  const color = BODY_COLORS[merId] || '#e53935';

  // 1. Meridian pathway (line)
  const path = document.createElementNS(ns, 'path');
  path.setAttribute('d', waypointsToPath(wp));
  path.setAttribute('fill', 'none');
  path.setAttribute('stroke', color);
  path.setAttribute('stroke-width', '2.8');
  path.setAttribute('stroke-linecap', 'round');
  path.setAttribute('stroke-linejoin', 'round');
  path.setAttribute('opacity', '0.7');
  svgEl.appendChild(path);

  // 2. Get points for this meridian
  const merPoints = POINTS.filter(p => p.mid === merId);
  const n = merPoints.length;
  if (n === 0) {
    svgEl.setAttribute('style', (svgEl.getAttribute('style')||'') + ';max-height:420px');
    return svgEl.outerHTML;
  }

  // 3. Distribute dot positions
  const positions = distributeOnPolyline(wp, n);

  // 4. Draw dots
  positions.forEach((pos, i) => {
    // Small dot for every point
    const dot = document.createElementNS(ns, 'circle');
    dot.setAttribute('cx', pos.x);
    dot.setAttribute('cy', pos.y);
    dot.setAttribute('r', '3.5');
    dot.setAttribute('fill', color);
    dot.setAttribute('opacity', i === selectedIdx ? '1' : '0.5');
    svgEl.appendChild(dot);

    // Highlight ring for selected point
    if (i === selectedIdx) {
      const ring = document.createElementNS(ns, 'circle');
      ring.setAttribute('cx', pos.x);
      ring.setAttribute('cy', pos.y);
      ring.setAttribute('r', '8');
      ring.setAttribute('fill', 'none');
      ring.setAttribute('stroke', '#e53935');
      ring.setAttribute('stroke-width', '2.5');
      ring.setAttribute('opacity', '0.9');
      svgEl.appendChild(ring);

      // Glow ring
      const glow = document.createElementNS(ns, 'circle');
      glow.setAttribute('cx', pos.x);
      glow.setAttribute('cy', pos.y);
      glow.setAttribute('r', '14');
      glow.setAttribute('fill', 'none');
      glow.setAttribute('stroke', color);
      glow.setAttribute('stroke-width', '5');
      glow.setAttribute('opacity', '0.2');
      svgEl.appendChild(glow);

      // Label for selected point
      const label = document.createElementNS(ns, 'text');
      label.setAttribute('x', pos.x + 14);
      label.setAttribute('y', pos.y - 8);
      label.setAttribute('fill', '#3d3228');
      label.setAttribute('font-size', '10');
      label.setAttribute('font-weight', 'bold');
      label.textContent = merPoints[i] ? merPoints[i].code + ' ' + merPoints[i].name : '';
      svgEl.appendChild(label);
    }
  });

  // 5. Legend — meridian name + point count
  const legend = document.createElementNS(ns, 'text');
  legend.setAttribute('x', '10');
  legend.setAttribute('y', '20');
  legend.setAttribute('fill', color);
  legend.setAttribute('font-size', '11');
  legend.setAttribute('font-weight', 'bold');
  legend.textContent = mer.name + '（' + n + '穴）';
  svgEl.appendChild(legend);

  // Direction hint
  const dir = document.createElementNS(ns, 'text');
  dir.setAttribute('x', '10');
  dir.setAttribute('y', '34');
  dir.setAttribute('fill', '#b0a69a');
  dir.setAttribute('font-size', '9');
  dir.textContent = '● 當前穴位  —— 經絡走向';
  svgEl.appendChild(dir);

  // Current point name
  const ptName = document.createElementNS(ns, 'text');
  ptName.setAttribute('x', '270');
  ptName.setAttribute('y', '20');
  ptName.setAttribute('fill', '#e53935');
  ptName.setAttribute('font-size', '11');
  ptName.setAttribute('font-weight', 'bold');
  ptName.setAttribute('text-anchor', 'end');
  ptName.textContent = merPoints[selectedIdx] ? merPoints[selectedIdx].code + ' ' + merPoints[selectedIdx].name : '';
  svgEl.appendChild(ptName);

  svgEl.setAttribute('style', (svgEl.getAttribute('style')||'') + ';max-height:420px');
  return svgEl.outerHTML;
}
